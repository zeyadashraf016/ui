<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliara — Inventory Intelligence · Beta UAE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }

  #header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  #dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  #dot.ok { background: #22c55e; }
  #dot.err { background: #ef4444; }
  #dot.checking { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  #header h1 { font-size: 16px; font-weight: 600; color: #111; }
  #header-sub { font-size: 12px; color: #888; margin-top: 1px; }
  #status-info { margin-left: auto; font-size: 12px; color: #888; text-align: right; }

  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .msg { display: flex; gap: 10px; max-width: 78%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.system { align-self: center; max-width: 90%; }

  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
  .msg.assistant .avatar { background: #ede9fe; color: #6d28d9; }
  .msg.user .avatar { background: #6d28d9; color: #fff; }

  .bubble { padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.55; }
  .msg.assistant .bubble { background: #fff; border: 1px solid #e5e5e5; border-radius: 4px 18px 18px 18px; color: #111; }
  .msg.user .bubble { background: #6d28d9; color: #fff; border-radius: 18px 4px 18px 18px; }
  .msg.system .bubble { background: #fef9c3; border: 1px solid #fde047; color: #854d0e; font-size: 13px; border-radius: 10px; padding: 10px 14px; }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 99px; margin-bottom: 8px; letter-spacing: 0.3px; }
  .badge-beta { background: #ede9fe; color: #5b21b6; }

  .bubble .body p { margin: 0 0 8px 0; }
  .bubble .body p:last-child { margin-bottom: 0; }
  .bubble .body ul { margin: 6px 0 8px 0; padding-left: 20px; }
  .bubble .body li { margin-bottom: 4px; }
  .bubble .body strong { font-weight: 700; color: #5b21b6; }
  .msg.assistant .bubble .body strong { color: #5b21b6; }

  .typing { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #c4b5fd; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)} }

  #input-row { background: #fff; border-top: 1px solid #e5e5e5; padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; }
  #input { flex: 1; border: 1.5px solid #e5e5e5; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; min-height: 42px; max-height: 120px; line-height: 1.4; outline: none; transition: border-color 0.15s; }
  #input:focus { border-color: #6d28d9; }
  #input:disabled { background: #fafafa; color: #aaa; }
  #send { width: 42px; height: 42px; border-radius: 50%; background: #6d28d9; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
  #send:hover:not(:disabled) { background: #5b21b6; }
  #send:active:not(:disabled) { transform: scale(0.95); }
  #send:disabled { background: #d8b4fe; cursor: not-allowed; }

  #debug { font-size: 11px; color: #999; padding: 6px 20px; background: #fafafa; border-top: 1px solid #f0f0f0; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .suggestions { display: flex; }
  .chip { background: #fff; border: 1.5px solid #ddd6fe; color: #6d28d9; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 99px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .chip:hover { background: #6d28d9; color: #fff; border-color: #6d28d9; transform: translateY(-1px); }
  .chip:active { transform: translateY(0); }

  .bubble.visual { width: 100%; max-width: 540px; }
  .viz-title { font-size: 13px; font-weight: 700; color: #5b21b6; margin-bottom: 10px; }
  .viz-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .viz-table th { text-align: left; padding: 7px 10px; background: #f5f3ff; color: #5b21b6; font-weight: 600; border-bottom: 2px solid #ede9fe; }
  .viz-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; color: #333; }
  .viz-table tr:hover td { background: #faf9ff; }
  .viz-overall { font-size: 13px; color: #333; margin-bottom: 10px; }
  .viz-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .viz-bar-label { width: 120px; font-size: 12px; color: #444; flex-shrink: 0; }
  .viz-bar-track { flex: 1; height: 16px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
  .viz-bar-fill { height: 100%; border-radius: 8px; transition: width 0.5s ease; }
  .viz-bar-val { width: 110px; font-size: 11.5px; color: #666; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>

<div id="header">
  <div id="dot" class="checking"></div>
  <div>
    <div id="header-h1" style="font-size:16px;font-weight:600;color:#111;">Eliara — Inventory Intelligence</div>
    <div id="header-sub">Beta UAE · Automotive Spare Parts · AI Decision Layer</div>
  </div>
  <div id="status-info">Model: <span id="model-name">—</span></div>
</div>

<div id="messages"></div>

<div id="debug" id="debug">Waiting for first message...</div>

<div id="input-row">
  <textarea id="input" placeholder="Type a message… (Enter to send)" rows="1" disabled></textarea>
  <button id="send" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ── API base: set window.ELIARA_API or NEXT_PUBLIC_API_URL at build time ──
const API_BASE = (window.ELIARA_API || "").replace(/\/$/, "");
function apiUrl(path){ return API_BASE + path; }

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('input');
const sendBtn     = document.getElementById('send');
const dot         = document.getElementById('dot');
const headerSub   = document.getElementById('header-sub');
const modelName   = document.getElementById('model-name');
const debugEl     = document.getElementById('debug');

let history = [];
let sessionContext = {};

// Smart follow-up chips — the dynamic conversation X-factor.
// These nudge managers toward the cost-of-inaction insight.
const SUGGESTIONS = {
  dead_stock:  ['How much money is trapped here?', 'What if we do nothing?', 'Which should we liquidate first?'],
  forecast:    ['What does this cost us if we wait?', 'Which items run out first?', 'What should we order now?'],
  supplier:    ['Why are they risky?', 'What if they fail to deliver?', 'Who can we switch to?'],
  procurement: ['What if we do nothing?', 'Which is most urgent?', 'How much will this cost?'],
  risks:       ['What is the financial impact?', 'What should we fix first?', 'Tell me more about the top one'],
  executive:   ['What is the #1 priority this week?', 'How much is at stake?', 'Show me the dead stock'],
  inventory:   ['What is hurting us most?', 'What is the cost of inaction?', 'What should we do first?'],
  health:      ['Why is the score low?', 'What is the fastest win?', 'What does this cost us?'],
  chitchat:    ['What is costing us money?', 'Which suppliers are risky?', 'What should we buy this week?'],
};

function showSuggestions(domain) {
  const chips = SUGGESTIONS[domain] || SUGGESTIONS['inventory'];
  const wrap = document.createElement('div');
  wrap.className = 'suggestions msg assistant';
  wrap.style.cssText = 'max-width:78%;flex-wrap:wrap;gap:8px;margin-left:42px;';
  chips.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = c;
    b.onclick = () => send(c);
    wrap.appendChild(b);
  });
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// Render structured visuals: table | bars | trend (inline SVG, brand-styled)
function renderVisual(v) {
  if (!v || !v.type) return;
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = 'EL';
  av.style.visibility = 'hidden';
  const bub = document.createElement('div');
  bub.className = 'bubble visual';

  let html = '';
  if (v.title) html += `<div class="viz-title">${escapeHtml(v.title)}</div>`;

  if (v.type === 'table') {
    html += '<table class="viz-table"><thead><tr>';
    v.columns.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
    html += '</tr></thead><tbody>';
    v.rows.forEach(r => {
      html += '<tr>';
      r.forEach(cell => html += `<td>${escapeHtml(String(cell))}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  else if (v.type === 'bars') {
    const maxV = v.max || 100;
    if (v.overall != null) html += `<div class="viz-overall">Overall: <strong>${v.overall}/${maxV}</strong></div>`;
    v.bars.forEach(b => {
      const pct = Math.max(2, Math.min(100, (b.value / maxV) * 100));
      const color = bandColor(b.band, b.value, maxV);
      html += `<div class="viz-bar-row">
        <div class="viz-bar-label">${escapeHtml(b.label)}</div>
        <div class="viz-bar-track"><div class="viz-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="viz-bar-val">${b.value}${b.band ? ' · ' + escapeHtml(b.band) : ''}</div>
      </div>`;
    });
  }
  else if (v.type === 'trend') {
    html += buildTrendSVG(v);
  }

  bub.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bub);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function bandColor(band, val, maxV) {
  const b = (band || '').toUpperCase();
  if (b === 'CRITICAL') return '#ef4444';
  if (b === 'WARNING')  return '#f59e0b';
  if (b === 'HEALTHY')  return '#22c55e';
  // fallback by value
  const r = val / maxV;
  return r < 0.4 ? '#ef4444' : r < 0.7 ? '#f59e0b' : '#22c55e';
}

function buildTrendSVG(v) {
  const pts = v.points || [];
  if (pts.length < 2) return '';
  const W = 460, H = 180, padL = 60, padR = 20, padT = 20, padB = 36;
  const maxV = Math.max(...pts.map(p => p.value)) * 1.15 || 1;
  const stepX = (W - padL - padR) / (pts.length - 1);
  const x = i => padL + i * stepX;
  const y = val => H - padB - (val / maxV) * (H - padT - padB);

  let path = '', area = '', dots = '', labels = '';
  pts.forEach((p, i) => {
    const px = x(i), py = y(p.value);
    path += (i === 0 ? 'M' : 'L') + px + ',' + py + ' ';
    area += (i === 0 ? 'M' + px + ',' + (H - padB) + ' L' : 'L') + px + ',' + py + ' ';
    dots += `<circle cx="${px}" cy="${py}" r="4" fill="#6d28d9"/>`;
    dots += `<text x="${px}" y="${py - 10}" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="600">${shortMoney(p.value)}</text>`;
    labels += `<text x="${px}" y="${H - 12}" text-anchor="middle" font-size="11" fill="#888">${escapeHtml(p.label)}</text>`;
  });
  area += `L${x(pts.length - 1)},${H - padB} Z`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;">
    <path d="${area}" fill="#ede9fe"/>
    <path d="${path}" fill="none" stroke="#6d28d9" stroke-width="2.5"/>
    ${dots}${labels}
  </svg>`;
}

function shortMoney(v) {
  if (v >= 1000) return (v/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return Math.round(v).toString();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function log(msg) {
  debugEl.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
}

// Lightweight, safe markdown -> HTML (bold, lists, line breaks, dollar amounts)
function renderMarkdown(text) {
  // Escape HTML first
  let html = String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic *text* (avoid touching already-converted bold)
  html = html.replace(/(^|[^*])\*([^*]+?)\*(?!\*)/g, '$1<em>$2</em>');

  // Split into lines for list / paragraph handling
  const lines = html.split('\n');
  let out = '', inList = false;
  for (let raw of lines) {
    const line = raw.trim();
    const isBullet = /^[-•]\s+/.test(line) || /^\d+[\.\)]\s+/.test(line);
    if (isBullet) {
      if (!inList) { out += '<ul>'; inList = true; }
      out += '<li>' + line.replace(/^[-•]\s+/, '').replace(/^\d+[\.\)]\s+/, '') + '</li>';
    } else {
      if (inList) { out += '</ul>'; inList = false; }
      if (line) out += '<p>' + line + '</p>';
    }
  }
  if (inList) out += '</ul>';
  return out;
}

const DOMAIN_LABELS = {
  dead_stock:  'Dead Stock · Beta UAE',
  forecast:    'Forecast · Beta UAE',
  supplier:    'Supplier Risk · Beta UAE',
  procurement: 'Procurement · Beta UAE',
  risks:       'Risk Radar · Beta UAE',
  executive:   'Executive Briefing · Beta UAE',
  inventory:   'Inventory · Beta UAE',
  health:      'Inventory Health · Beta UAE',
};

function addMsg(role, content, domain) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  if (role !== 'system') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'user' ? 'You' : 'EL';
    wrap.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble';

  if (domain && domain !== 'chitchat' && domain !== 'error' && DOMAIN_LABELS[domain]) {
    const b = document.createElement('div');
    b.className = 'badge badge-beta';
    b.textContent = DOMAIN_LABELS[domain];
    bub.appendChild(b);
  }

  const body = document.createElement('div');
  body.className = 'body';
  if (role === 'assistant') {
    body.innerHTML = renderMarkdown(content);
  } else {
    body.textContent = content;
  }
  bub.appendChild(body);
  wrap.appendChild(bub);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  const av = document.createElement('div'); av.className = 'avatar'; av.textContent = 'AI';
  const bub = document.createElement('div'); bub.className = 'bubble';
  bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(av); wrap.appendChild(bub);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

async function checkHealth() {
  try {
    log('Checking /health...');
    const res = await fetch(apiUrl('/health'));
    const data = await res.json();

    modelName.textContent = data.model || '—';

    if (data.ollama === 'connected') {
      dot.className = 'ok';
      headerSub.textContent = 'Qwen connected — ready to chat';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
      addMsg('system', '✓ Eliara is online and ready. Ask me what is costing you money.');
      showSuggestions('chitchat');
      log('Health OK — ollama connected, model: ' + data.model);
    } else {
      dot.className = 'err';
      headerSub.textContent = 'Ollama unreachable — is it running?';
      addMsg('system', '⚠ API is running but cannot reach Ollama. Make sure Ollama is running on your laptop and the model is pulled (ollama pull qwen3:latest).');
      log('Health OK but ollama unreachable');
    }
  } catch(e) {
    dot.className = 'err';
    headerSub.textContent = 'API unreachable';
    log('Health check failed: ' + e.message);
  }
}

async function send(presetText) {
  const text = (presetText || inputEl.value).trim();
  if (!text) return;

  // remove any existing suggestion chips
  document.querySelectorAll('.suggestions').forEach(el => el.remove());

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  inputEl.disabled = true;

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  log('Sending to /ask — domain classification in progress...');

  const typing = addTyping();

  try {
    const res = await fetch(apiUrl('/ask'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text, history, session_context: sessionContext }),
    });
    const data = await res.json();
    typing.remove();

    // Persist session context so follow-ups (why / how much / the 2nd one) work
    if (data.session_context) sessionContext = data.session_context;

    // Safely extract answer as a string (handle object responses)
    let answer = data.answer || data.detail || data.reply || 'No response.';
    if (typeof answer === 'object') {
      answer = answer.text || answer.content || JSON.stringify(answer);
    }
    addMsg('assistant', String(answer), data.domain);
    history.push({ role: 'assistant', content: answer });

    // Render a visual (table / bar chart / trend) when the answer includes one
    if (data.visual) renderVisual(data.visual);

    log('Response received — domain: ' + (data.domain || 'unknown'));

    // Show smart follow-up chips based on the domain (the dynamic X-factor)
    showSuggestions(data.domain);
  } catch(e) {
    typing.remove();
    addMsg('system', 'Request failed: ' + e.message);
    log('Request error: ' + e.message);
  }

  sendBtn.disabled = false;
  inputEl.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

checkHealth();
</script>
</body>
</html>
